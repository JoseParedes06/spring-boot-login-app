<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <!-- Sugerencia: enlaza tu CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Sugerencia: muestra mensaje de error si el usuario ya existe -->
    <div th:if="${error}" th:text="${error}"></div>
    <!-- Formulario de registro -->
    <!-- th:action="@{/register}" apunta al @PostMapping("/register") -->
    <form th:action="@{/register}" method="post">
        <!-- Sugerencia: campo username -->
        <!-- Sugerencia: campo password -->
        <input type="text" name="username">
        <input type="password" name="password">
        <!-- Sugerencia: botón de submit -->
        <button type="submit">Registrarse</button>
    </form>
    <a th:href="@{/}">¿Ya tienes cuenta? Inicia sesión</a>
    <!-- Sugerencia: enlace de vuelta al login para quien ya tiene cuenta -->
</body>
</html>
